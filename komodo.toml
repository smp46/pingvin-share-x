# Komodo Resource Sync — Pingvin Share X
#
# Clones this fork and builds on your TrueNAS/Komodo server.
# No GHCR image required.

[[stack]]
name = "pingvin-share-x"
description = "Pingvin Share X — native filesystem uploads for SMB browsing"
deploy = true
tags = ["pingvin", "media"]

[stack.config]
# Change this to match your Komodo Server resource name
server = "truenas"

repo = "Jimmy-star-dotcom/pingvin-share-x"
branch = "feature/native-filesystem-storage"
file_paths = ["compose.komodo.yaml"]
run_build = true
poll_for_updates = false
auto_update = false
