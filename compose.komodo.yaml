# TrueNAS / Komodo compose — builds this repo and binds NAS paths.
# Used by komodo.toml (Stack file_paths).

services:
  pingvin-share-x:
    container_name: pingvin-share-x
    build:
      context: .
      dockerfile: Dockerfile
    image: pingvin-share-x:native-fs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TRUST_PROXY=true
      - PUID=568
      - PGID=568
      - DATA_DIRECTORY=/opt/app/backend/data
    volumes:
      - /mnt/tank/Subimods/Marketing/Pingvin:/opt/app/backend/data:rw
      - /mnt/tank/apps/pingvin/images:/opt/app/frontend/public/img:rw
      # Uncomment to lock config via YAML instead of the UI:
      # - /mnt/tank/apps/pingvin/config.yaml:/opt/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 90s
